{% extends 'base.html' %}
{% load static %}

{% block title %}Processing Results | Persona AI{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center justify-center">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg text-center">
        <div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900">
                Processing Your Results
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                Please wait while our AI analyzes your responses. This usually takes a few moments.
            </p>
        </div>

        <div class="mt-8 flex justify-center">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600"></div>
        </div>

        <div class="mt-6">
            <p id="status-text" class="text-md font-medium text-indigo-600">
                Analyzing audio...
            </p>
            <div class="w-full bg-gray-200 rounded-full h-2.5 mt-4">
                <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <p id="pending-count" class="text-xs text-gray-500 mt-2">
                Checking status...
            </p>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sessionId = "{{ session_id }}";
        const statusText = document.getElementById('status-text');
        const pendingCountText = document.getElementById('pending-count');
        const progressBar = document.getElementById('progress-bar');
        
        let pollInterval = setInterval(checkStatus, 3000);

        function checkStatus() {
            fetch(`/analysis/processing-status/${sessionId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        if (data.processing_complete) {
                            clearInterval(pollInterval);
                            statusText.textContent = "Processing complete! Redirecting...";
                            progressBar.style.width = "100%";
                            pendingCountText.textContent = "";
                            
                            // Reload the page to view results
                            setTimeout(() => {
                                window.location.reload();
                            }, 1000);
                        } else {
                            pendingCountText.textContent = `${data.pending_count} response(s) still processing...`;
                            progressBar.style.width = `${data.progress_percentage}%`;
                        }
                    } else {
                        console.error('Error checking status:', data.error);
                    }
                })
                .catch(error => {
                    console.error('Fetch error:', error);
                });
        }
        
        // Initial check
        checkStatus();
    });
</script>
{% endblock %}
